<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Racing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0221;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  h1 {
    font-size: 2rem;
    color: #e94560;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-shadow: 0 0 20px #e94560;
  }
  #ui {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    font-size: 16px;
    letter-spacing: 2px;
  }
  .stat { color: #aaa; }
  .stat span { color: #e94560; font-weight: bold; }
  canvas {
    display: block;
    border: 2px solid #e94560;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(233,69,96,0.4);
  }
  #msg {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
    letter-spacing: 1px;
  }
  #startBtn {
    margin-top: 14px;
    padding: 10px 36px;
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    border: 2px solid #e94560;
    background: transparent;
    color: #e94560;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.2s;
  }
  #startBtn:hover {
    background: #e94560;
    color: #fff;
    box-shadow: 0 0 20px rgba(233,69,96,0.6);
  }
</style>
</head>
<body>

<h1>🏍 Bike Racing</h1>

<div id="ui">
  <div class="stat">Score: <span id="score">0</span></div>
  <div class="stat">Speed: <span id="speed">0</span> km/h</div>
  <div class="stat">Lives: <span id="lives">3</span></div>
</div>

<canvas id="gameCanvas" width="600" height="300"></canvas>
<div id="msg">← → keys ya A/D se lane badlo | Space/↑ se jump karo</div>
<button id="startBtn">▶ Game Shuru Karo</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'idle';
let score = 0, lives = 3, speed = 60, frame = 0;
let roadOffset = 0;
let obstacles = [];
let particles = [];
let invincible = 0;

const bike = { x: 120, y: 220, w: 54, h: 30, vy: 0, onGround: true, lane: 1 };
const LANES = [160, 215, 260];
const GRAVITY = 0.7, JUMP = -12;

function drawRoad() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 130, 600, 170);
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, 128, 600, 4);
  ctx.fillStyle = '#e94560';
  ctx.fillRect(0, 292, 600, 4);
  for (let i = 0; i < 7; i++) {
    let x = ((i * 100) - (roadOffset % 100));
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x, 214, 60, 3);
    ctx.fillRect(x, 258, 60, 3);
  }
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, 130);
  grad.addColorStop(0, '#0d0221');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 600, 130);
  [30,90,160,250,350,450,530,570].forEach((sx,i) => {
    ctx.fillStyle = `rgba(255,255,255,${0.4 + (i % 3) * 0.2})`;
    ctx.beginPath();
    ctx.arc(sx, 20 + (i%4)*22, 1.5, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.save();
  ctx.beginPath();
  ctx.arc(500, 40, 28, Math.PI, 2 * Math.PI);
  ctx.fillStyle = '#e94560';
  ctx.fill();
  for (let i = 1; i <= 6; i++) {
    ctx.beginPath();
    ctx.arc(500, 40, 28 + i * 8, Math.PI, 2 * Math.PI);
    ctx.strokeStyle = `rgba(233,69,96,${0.15 - i * 0.02})`;
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  ctx.restore();
  const bx = (roadOffset * 0.4) % 700 - 100;
  ctx.fillStyle = '#1a1a4e';
  ctx.beginPath(); ctx.moveTo(bx, 130); ctx.lineTo(bx+40, 80); ctx.lineTo(bx+80, 130); ctx.fill();
  ctx.beginPath(); ctx.moveTo(bx+60, 130); ctx.lineTo(bx+100, 70); ctx.lineTo(bx+140, 130); ctx.fill();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBike(b) {
  if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) return;
  const x = b.x, y = b.y;
  ctx.save();
  ctx.shadowColor = '#e94560'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#e94560';
  roundRect(x+4, y+2, 40, 16, 4); ctx.fill();
  ctx.fillStyle = '#ff6b6b';
  roundRect(x+24, y-2, 20, 12, 3); ctx.fill();
  ctx.fillStyle = '#c0392b';
  roundRect(x+4, y+14, 40, 6, 2); ctx.fill();
  ctx.shadowBlur = 0;
  [[x+8,y+22],[x+40,y+22]].forEach(([cx,cy]) => {
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = 'rgba(233,69,96,0.6)';
  ctx.beginPath(); ctx.ellipse(x+2, y+18, 12, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.shadowColor = '#f39c12'; ctx.shadowBlur = 6;
  ctx.fillStyle = '#f39c12';
  roundRect(o.x, o.y, o.w, o.h, 4); ctx.fill();
  ctx.fillStyle = '#e67e22';
  ctx.fillRect(o.x+4, o.y+4, o.w-8, o.h/2);
  ctx.fillStyle = '#e74c3c';
  roundRect(o.x+6, o.y-6, 8, 8, 2); ctx.fill();
  ctx.fillStyle = '#c0392b';
  ctx.fillRect(o.x+8, o.y-8, 4, 4);
  ctx.restore();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    p.x += p.vx; p.y += p.vy; p.life--;
  });
  ctx.globalAlpha = 1;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, r: Math.random()*4+1, color, life: 30 });
  }
}

function spawnObstacle() {
  const lane = Math.floor(Math.random() * 3);
  obstacles.push({ x: 620, y: LANES[lane] - 20, w: 28, h: 24, lane });
}

function updateBike() {
  if (!bike.onGround) { bike.vy += GRAVITY; bike.y += bike.vy; }
  const ground = LANES[bike.lane] - bike.h + 8;
  if (bike.y >= ground) { bike.y = ground; bike.vy = 0; bike.onGround = true; }
}

function checkCollision() {
  obstacles.forEach((o, i) => {
    if (o.lane !== bike.lane) return;
    if (!bike.onGround) return;
    const bx1 = bike.x+6, bx2 = bike.x+bike.w-6;
    const by1 = bike.y+4, by2 = bike.y+bike.h;
    if (bx2 > o.x+4 && bx1 < o.x+o.w-4 && by2 > o.y+2 && by1 < o.y+o.h) {
      if (invincible > 0) return;
      spawnParticles(o.x+o.w/2, o.y, '#f39c12');
      obstacles.splice(i, 1);
      lives--;
      invincible = 90;
      document.getElementById('lives').textContent = lives;
      if (lives <= 0) endGame();
    }
  });
}

function endGame() {
  gameState = 'dead';
  document.getElementById('startBtn').textContent = '↺ Phir Khelna';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('msg').textContent = `Game Over! Score: ${score} — Dobara kheloge?`;
}

document.addEventListener('keydown', e => {
  if ([' ','ArrowLeft','ArrowRight','ArrowUp','a','d','w','A','D','W'].includes(e.key)) e.preventDefault();
  if (gameState !== 'playing') return;
  if ([' ','ArrowUp','w','W'].includes(e.key) && bike.onGround) {
    bike.vy = JUMP; bike.onGround = false;
    spawnParticles(bike.x+27, bike.y+bike.h, '#e94560');
  }
  if (['ArrowLeft','a','A'].includes(e.key) && bike.lane > 0) {
    bike.lane--; bike.y = LANES[bike.lane] - bike.h + 8;
  }
  if (['ArrowRight','d','D'].includes(e.key) && bike.lane < 2) {
    bike.lane++; bike.y = LANES[bike.lane] - bike.h + 8;
  }
});

let lastObstacle = 0;

function gameLoop() {
  if (gameState !== 'playing') return;
  ctx.clearRect(0, 0, 600, 300);
  frame++;
  roadOffset += speed / 60;
  speed = Math.min(180, 60 + score * 0.3);
  document.getElementById('speed').textContent = Math.round(speed);
  drawSky();
  drawRoad();
  if (frame - lastObstacle > Math.max(40, 100 - score/10)) {
    spawnObstacle(); lastObstacle = frame;
  }
  obstacles = obstacles.filter(o => o.x > -60);
  obstacles.forEach(o => { o.x -= speed / 60; drawObstacle(o); });
  updateBike();
  checkCollision();
  drawBike(bike);
  drawParticles();
  if (invincible > 0) invincible--;
  score++;
  document.getElementById('score').textContent = score;
  requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0; lives = 3; speed = 60; frame = 0;
  roadOffset = 0; obstacles = []; particles = []; invincible = 0;
  bike.lane = 1; bike.y = LANES[1] - bike.h + 8; bike.vy = 0; bike.onGround = true;
  document.getElementById('score').textContent = '0';
  document.getElementById('speed').textContent = '0';
  document.getElementById('lives').textContent = '3';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('msg').textContent = '← → se lane change | Space/↑ se jump karo';
  gameState = 'playing';
  gameLoop();
}

document.getElementById('startBtn').addEventListener('click', startGame);

// Initial render
ctx.clearRect(0,0,600,300);
drawSky(); drawRoad(); drawBike(bike);
ctx.fillStyle = 'rgba(255,255,255,0.85)';
ctx.font = 'bold 26px Courier New';
ctx.textAlign = 'center';
ctx.fillText('BIKE RACING', 300, 185);
ctx.font = '14px Courier New';
ctx.fillStyle = 'rgba(255,255,255,0.4)';
ctx.fillText('Neeche button dabao shuru karne ke liye', 300, 215);
</script>
</body>
</html>
